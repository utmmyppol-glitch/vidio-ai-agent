version: '3.8'

services:
  app:
    build: .
    container_name: vidio-ai-agent
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-vidio_ai}
      - DB_USER=${DB_USER:-vidio}
      - DB_PASSWORD=${DB_PASSWORD:-vidio1234}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - generated-content:/app/generated-content
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vidio-network

  mysql:
    image: mysql:8.0
    container_name: vidio-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootpass}
      - MYSQL_DATABASE=${DB_NAME:-vidio_ai}
      - MYSQL_USER=${DB_USER:-vidio}
      - MYSQL_PASSWORD=${DB_PASSWORD:-vidio1234}
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vidio-network

  redis:
    image: redis:7-alpine
    container_name: vidio-redis
    ports:
      - "${REDIS_EXTERNAL_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vidio-network

volumes:
  mysql-data:
  redis-data:
  generated-content:

networks:
  vidio-network:
    driver: bridge
