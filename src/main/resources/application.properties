spring.application.name=vidio-ai-agent

# Anthropic Claude AI
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-20250514
spring.ai.anthropic.chat.options.max-tokens=4096

# ============================================
# MySQL (영구 저장)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/vidio_ai?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Async
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10

# File Upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Generated Content Storage
app.content.output-dir=./generated-content
app.content.video-dir=./generated-content/videos
app.content.thumbnail-dir=./generated-content/thumbnails

# Pexels API (무료 — https://www.pexels.com/api/ 에서 발급, 없으면 Lorem Picsum 사용)
